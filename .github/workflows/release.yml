name: Release

on:
  release:
    types: [created]

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  # ── synergia-client (all OS/arch) ─────────────────────────────────
  build-client:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            cgo: 1
            tags: ""
            artifact: synergia-client-linux-amd64
            deps: sudo apt-get update && sudo apt-get install -y gcc libgtk-3-dev libayatana-appindicator3-dev
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            cgo: 0
            tags: ""
            artifact: synergia-client-linux-arm64
            deps: ""
          - os: macos-latest
            goos: darwin
            goarch: arm64
            cgo: 1
            tags: ""
            artifact: synergia-client-darwin-arm64
            deps: ""
          - os: windows-latest
            goos: windows
            goarch: amd64
            cgo: 1
            tags: ""
            artifact: synergia-client-windows-amd64.exe
            deps: ""
          - os: windows-latest
            goos: windows
            goarch: arm64
            cgo: 0
            tags: ""
            artifact: synergia-client-windows-arm64.exe
            deps: ""
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Install system dependencies
        if: matrix.deps != ''
        run: ${{ matrix.deps }}

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: ${{ matrix.cgo }}
        run: |
          VERSION="${GITHUB_REF_NAME}"
          COMMIT="${GITHUB_SHA::8}"
          PKG="github.com/ylallemant/synergia/internal/client/version"
          LDFLAGS="-s -w -X ${PKG}.Version=${VERSION} -X ${PKG}.Commit=${COMMIT}"
          # On Windows, link with the GUI subsystem so double-clicking the .exe
          # from Explorer doesn't open a console window (and so closing the
          # accidentally-spawned console doesn't kill the worker). The tray
          # icon menu — including Quit — is the user-facing UI. Logs go to
          # the data-dir's client.log; stdout/stderr go nowhere. This is the
          # standard pattern for Go background apps on Windows.
          if [ "${{ matrix.goos }}" = "windows" ]; then
            LDFLAGS="${LDFLAGS} -H windowsgui"
          fi
          TAGS="${{ matrix.tags }}"
          if [ -n "$TAGS" ]; then
            go build -tags "$TAGS" -ldflags="${LDFLAGS}" -o dist/${{ matrix.artifact }} ./cmd/synergia-client
          else
            go build -ldflags="${LDFLAGS}" -o dist/${{ matrix.artifact }} ./cmd/synergia-client
          fi
        shell: bash

      # TODO: code-sign and notarize darwin binaries with an Apple Developer ID
      # certificate so macOS Gatekeeper accepts them without the
      # "damaged and can't be opened" prompt. Requires:
      #   - APPLE_DEVELOPER_ID_CERT secret (p12, base64)
      #   - APPLE_DEVELOPER_ID_CERT_PASSWORD secret
      #   - APPLE_ID / APPLE_TEAM_ID / APPLE_APP_PASSWORD secrets for notarytool
      # Steps: import cert → codesign --deep --sign → xcrun notarytool submit
      # See docs/apple-developer-id.md for the full workflow snippet.

      - name: Create .app bundle and DMG (darwin only)
        if: matrix.goos == 'darwin'
        run: |
          VERSION="${GITHUB_REF_NAME}"
          APP="dist/Synergia.app"
          DMG="dist/synergia-darwin-${{ matrix.goarch }}.dmg"

          mkdir -p "${APP}/Contents/MacOS"
          cp "dist/${{ matrix.artifact }}" "${APP}/Contents/MacOS/synergia-client"
          chmod +x "${APP}/Contents/MacOS/synergia-client"

          cat > "${APP}/Contents/Info.plist" << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key>   <string>synergia-client</string>
            <key>CFBundleIdentifier</key>   <string>net.synergia.client</string>
            <key>CFBundleName</key>          <string>Synergia</string>
            <key>CFBundleShortVersionString</key> <string>${VERSION}</string>
            <key>CFBundlePackageType</key>   <string>APPL</string>
            <key>LSUIElement</key>           <true/>
          </dict>
          </plist>
          PLIST

          hdiutil create \
            -volname "Synergia ${VERSION}" \
            -srcfolder "${APP}" \
            -ov -format UDZO \
            "${DMG}"
        shell: bash

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/${{ matrix.artifact }}
            ${{ matrix.goos == 'darwin' && format('dist/synergia-darwin-{0}.dmg', matrix.goarch) || '' }}

  # ── synergia-updater (Windows only) ──────────────────────────────
  build-updater:
    strategy:
      matrix:
        include:
          - os: windows-latest
            goos: windows
            goarch: amd64
            artifact: synergia-updater-windows-amd64.exe
          - os: windows-latest
            goos: windows
            goarch: arm64
            artifact: synergia-updater-windows-arm64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Build updater
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          LDFLAGS="-s -w"
          go build -ldflags="${LDFLAGS}" -o dist/${{ matrix.artifact }} ./cmd/synergia-updater
        shell: bash

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.artifact }}

  # ── synergia-manager (Linux binaries + container image) ───────────
  build-manager:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ${{ github.repository }}/synergia-manager
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Run tests
        run: go test ./...

      - name: Build binaries
        run: |
          VERSION="${GITHUB_REF_NAME}"
          COMMIT="${GITHUB_SHA::8}"
          LDFLAGS="-s -w -X main.version=${VERSION} -X main.commit=${COMMIT}"
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -ldflags="${LDFLAGS}" -o dist/synergia-manager-linux-amd64 ./cmd/synergia-manager
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -ldflags="${LDFLAGS}" -o dist/synergia-manager-linux-arm64 ./cmd/synergia-manager

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/synergia-manager-linux-amd64
            dist/synergia-manager-linux-arm64

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=

      - name: Build and push container image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_VERSION=${{ github.ref_name }}
            BUILD_COMMIT=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
